<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarus - 对弈与分析</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* 金色系统 */
            --color-primary-gold: #d4af37;
            --color-gold-light: #f4d03f;
            --color-gold-dark: #b8941e;
            --color-gold-darker: #8b6914;

            /* 墨色系统 */
            --color-ink-black: #1a1a1a;
            --color-ink-darkgray: #2d2d2d;
            --color-ink-gray: #4a4a4a;
            --color-mountain-gray: #6b7280;

            /* 米白系统 */
            --color-mist-white: #f5f0e8;
            --color-paper-white: rgba(245, 240, 232, 0.92);

            /* 字体 */
            --font-title: 'STKaiti', 'KaiTi', 'Microsoft YaHei', 'SimHei', serif;
            --font-primary: 'Microsoft YaHei', 'SimSun', 'STSong', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-primary);
            background: #0f0f0f;
            color: var(--color-ink-darkgray);
            padding: 20px;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 天空背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 50% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                linear-gradient(to bottom, #1a1a1a 0%, #2d2d2d 30%, #1a1a1a 60%, #0f0f0f 100%);
            z-index: -5;
            pointer-events: none;
        }

        /* 山峰层 */
        .ink-mountain {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
        }

        .ink-mountain.layer-3 {
            height: 60%;
            background: linear-gradient(to bottom,
                transparent 0%,
                rgba(96, 165, 250, 0.1) 30%,
                rgba(75, 85, 99, 0.35) 60%,
                rgba(55, 65, 81, 0.45) 100%);
            clip-path: polygon(0% 100%, 0% 50%, 8% 54%, 15% 48%, 22% 52%, 28% 45%, 35% 50%, 42% 42%, 48% 48%, 55% 40%, 62% 46%, 68% 38%, 75% 44%, 82% 36%, 88% 42%, 95% 48%, 100% 44%, 100% 100%);
            filter: blur(4px);
            z-index: -3;
        }

        .ink-mountain.layer-2 {
            height: 55%;
            background: linear-gradient(to bottom,
                transparent 0%,
                rgba(96, 165, 250, 0.15) 20%,
                rgba(75, 85, 99, 0.55) 50%,
                rgba(55, 65, 81, 0.7) 100%);
            clip-path: polygon(0% 100%, 0% 60%, 6% 63%, 12% 56%, 18% 60%, 24% 52%, 30% 57%, 36% 48%, 42% 54%, 48% 46%, 54% 52%, 60% 44%, 66% 50%, 72% 42%, 78% 48%, 84% 55%, 90% 50%, 96% 58%, 100% 52%, 100% 100%);
            filter: blur(2px);
            z-index: -2;
        }

        .ink-mountain.layer-1 {
            height: 50%;
            background: linear-gradient(to bottom,
                transparent 0%,
                rgba(75, 85, 99, 0.7) 30%,
                rgba(55, 65, 81, 0.85) 60%,
                rgba(31, 41, 55, 0.95) 100%);
            clip-path: polygon(0% 100%, 0% 70%, 3% 75%, 7% 68%, 12% 72%, 18% 65%, 23% 70%, 28% 62%, 33% 68%, 38% 60%, 43% 65%, 48% 58%, 53% 63%, 58% 55%, 63% 60%, 68% 52%, 73% 58%, 78% 50%, 83% 55%, 88% 62%, 93% 58%, 97% 65%, 100% 60%, 100% 100%);
            filter: blur(0.5px);
            z-index: -1;
        }

        /* 云雾效果 */
        .mountain-mist {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: -1;
        }

        .mountain-mist::before,
        .mountain-mist::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle,
                rgba(255, 255, 255, 0.12) 0%,
                rgba(255, 255, 255, 0.05) 40%,
                transparent 70%);
            filter: blur(40px);
            animation: mistFlow 20s ease-in-out infinite;
        }

        .mountain-mist::before {
            width: 1000px;
            height: 500px;
            top: 15%;
            left: -10%;
        }

        .mountain-mist::after {
            width: 800px;
            height: 400px;
            top: 35%;
            right: -10%;
            animation-delay: 10s;
        }

        @keyframes mistFlow {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            50% { transform: translate(100px, -50px) scale(1.2); opacity: 0.5; }
        }

        /* 金色光线 */
        .light-ray {
            position: fixed;
            width: 2px;
            height: 100%;
            background: linear-gradient(to bottom,
                transparent 0%,
                rgba(212, 175, 55, 0.3) 30%,
                rgba(244, 208, 63, 0.5) 50%,
                rgba(212, 175, 55, 0.3) 70%,
                transparent 100%);
            filter: blur(2px);
            transform-origin: top center;
            z-index: 4;
            pointer-events: none;
        }

        .light-ray:nth-child(5) { left: 15%; animation: rayPulse 4s ease-in-out infinite, raySway 8s ease-in-out infinite; }
        .light-ray:nth-child(6) { left: 35%; animation: rayPulse 5s ease-in-out infinite 1s, raySway 10s ease-in-out infinite; }
        .light-ray:nth-child(7) { right: 35%; animation: rayPulse 4.5s ease-in-out infinite 2s, raySway 9s ease-in-out infinite; }
        .light-ray:nth-child(8) { right: 15%; animation: rayPulse 5.5s ease-in-out infinite 1.5s, raySway 11s ease-in-out infinite; }

        @keyframes rayPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }

        @keyframes raySway {
            0%, 100% { transform: rotate(-2deg); }
            50% { transform: rotate(2deg); }
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, rgba(244, 208, 63, 0.8), transparent);
            border-radius: 50%;
            animation: particleFloat 15s linear infinite;
            opacity: 0;
        }

        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(100vh) translateX(0) scale(0); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100px) translateX(var(--drift)) scale(1); }
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 600px 1fr;
            gap: 20px;
        }

        .board-section {
            background: rgba(245, 240, 232, 0.92);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 3px solid rgba(212, 175, 55, 0.6);
            border-radius: 32px;
            padding: 20px;
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(212, 175, 55, 0.3),
                inset 0 0 60px rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            background: rgba(245, 240, 232, 0.92);
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            border: 3px solid rgba(212, 175, 55, 0.6);
            border-radius: 32px;
            padding: 20px;
            box-shadow:
                0 20px 40px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(212, 175, 55, 0.3),
                inset 0 0 60px rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 10;
        }

        h2 {
            font-family: var(--font-title);
            margin-bottom: 15px;
            color: var(--color-gold-darker);
            font-size: 1.3rem;
            font-weight: 900;
            letter-spacing: 0.05em;
        }

        canvas {
            display: block;
            cursor: crosshair;
            border: 2px solid #383838;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg,
                rgba(212, 175, 55, 0.95) 0%,
                rgba(244, 208, 63, 1) 50%,
                rgba(212, 175, 55, 0.95) 100%);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #1a1a1a;
            border: 2px solid rgba(255, 255, 255, 0.4);
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 900;
            letter-spacing: -0.01em;
            transition: all 0.3s ease;
            box-shadow:
                0 0 30px rgba(212, 175, 55, 0.5),
                0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.3) 50%, transparent 70%);
            animation: btnShine 3s linear infinite;
        }

        @keyframes btnShine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        button:hover {
            transform: scale(1.05);
            box-shadow:
                0 0 50px rgba(212, 175, 55, 0.8),
                0 12px 30px rgba(0, 0, 0, 0.4);
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        button:disabled::before {
            display: none;
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 2px solid rgba(212, 175, 55, 0.4);
            color: var(--color-ink-darkgray);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        button.secondary::before {
            display: none;
        }

        button.secondary:hover {
            background: rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.6);
        }

        .suggestion-item {
            padding: 12px;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .suggestion-item:hover {
            border-color: var(--color-primary-gold);
            background: rgba(244, 208, 63, 0.1);
        }

        .suggestion-item.selected {
            border-color: var(--color-primary-gold);
            background: rgba(244, 208, 63, 0.2);
        }

        .suggestion-rank {
            font-weight: 600;
            color: var(--color-primary-gold);
            margin-right: 10px;
        }

        .suggestion-move {
            font-weight: 600;
            font-size: 1.1rem;
            flex: 1;
        }

        .suggestion-stats {
            font-size: 0.9rem;
            color: #666;
        }

        .info-box {
            background: rgba(244, 208, 63, 0.1);
            border: 2px solid var(--color-primary-gold);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .status {
            font-size: 0.9rem;
            color: #666;
            margin-top: 10px;
        }

        .loading {
            color: var(--color-primary-gold);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- 山水背景装饰元素 -->
    <div class="mountain-mist"></div>
    <div class="ink-mountain layer-3"></div>
    <div class="ink-mountain layer-2"></div>
    <div class="ink-mountain layer-1"></div>

    <!-- 金色光线 -->
    <div class="light-ray"></div>
    <div class="light-ray"></div>
    <div class="light-ray"></div>
    <div class="light-ray"></div>

    <div class="container">
        <div class="board-section">
            <h2>棋盘</h2>
            <canvas id="board" width="560" height="560"></canvas>

            <div class="controls">
                <button id="playWithAIBtn">🤖 与AI对弈</button>
                <button id="getSuggestionsBtn">💡 获取AI推荐</button>
                <button id="compareBtn" disabled>⚖️ 对比选中着法</button>
                <button class="secondary" id="undoBtn">↶ 悔棋</button>
                <button class="secondary" id="resetBtn">🔄 重置</button>
            </div>

            <div class="info-box">
                <div><strong>当前模式:</strong> <span id="modeDisplay">编辑棋盘</span></div>
                <div><strong>下一手:</strong> <span id="nextPlayer">黑棋</span></div>
                <div><strong>手数:</strong> <span id="moveCount">0</span></div>
            </div>

            <div class="status" id="status"></div>
        </div>

        <div class="sidebar">
            <div class="panel" id="suggestionsPanel" style="display: none;">
                <h2>AI 推荐着法</h2>
                <div id="suggestionsList"></div>
            </div>

            <div class="panel" id="comparisonPanel" style="display: none;">
                <h2>着法对比分析</h2>
                <div id="comparisonContent">
                    <p>选择两个着法进行对比...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const BOARD_SIZE = 19;
        const CELL_SIZE = 28;
        const OFFSET = 30;

        let boardState = Array(19).fill(null).map(() => Array(19).fill(null));
        let moveHistory = [];
        let currentPlayer = 'B'; // B or W
        let playingWithAI = false;
        let aiSuggestions = [];
        let selectedMoves = new Set(); // For comparison

        function drawBoard() {
            ctx.fillStyle = '#f4efea';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = '#383838';
            ctx.lineWidth = 1;

            for (let i = 0; i < BOARD_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(OFFSET, OFFSET + i * CELL_SIZE);
                ctx.lineTo(OFFSET + (BOARD_SIZE - 1) * CELL_SIZE, OFFSET + i * CELL_SIZE);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(OFFSET + i * CELL_SIZE, OFFSET);
                ctx.lineTo(OFFSET + i * CELL_SIZE, OFFSET + (BOARD_SIZE - 1) * CELL_SIZE);
                ctx.stroke();
            }

            // Star points
            const starPoints = [[3,3],[9,3],[15,3],[3,9],[9,9],[15,9],[3,15],[9,15],[15,15]];
            ctx.fillStyle = '#383838';
            starPoints.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.arc(OFFSET + x * CELL_SIZE, OFFSET + y * CELL_SIZE, 4, 0, 2 * Math.PI);
                ctx.fill();
            });

            // Stones
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (boardState[y][x]) {
                        const px = OFFSET + x * CELL_SIZE;
                        const py = OFFSET + y * CELL_SIZE;

                        ctx.beginPath();
                        ctx.arc(px, py, 12, 0, 2 * Math.PI);
                        ctx.fillStyle = boardState[y][x] === 'B' ? '#000' : '#fff';
                        ctx.fill();
                        ctx.strokeStyle = '#383838';
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }

            // AI suggestions overlay
            if (aiSuggestions.length > 0) {
                aiSuggestions.forEach((sug, idx) => {
                    const coords = moveToCoords(sug.move);
                    if (coords) {
                        const [x, y] = coords;
                        const px = OFFSET + x * CELL_SIZE;
                        const py = OFFSET + y * CELL_SIZE;

                        // Draw suggestion marker
                        ctx.beginPath();
                        ctx.arc(px, py, 10, 0, 2 * Math.PI);
                        ctx.fillStyle = 'rgba(77, 166, 255, 0.3)';
                        ctx.fill();
                        ctx.strokeStyle = '#4da6ff';
                        ctx.lineWidth = 2;
                        ctx.stroke();

                        // Draw rank number
                        ctx.fillStyle = '#4da6ff';
                        ctx.font = 'bold 14px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(idx + 1, px, py);
                    }
                });
            }
        }

        function moveToCoords(move) {
            if (!move || move === 'pass') return null;
            const col = move.charCodeAt(0) - 65; // A=0, B=1, ...
            const row = parseInt(move.substring(1)) - 1;
            return [col >= 8 ? col - 1 : col, row]; // Skip I
        }

        function coordsToMove(x, y) {
            const col = String.fromCharCode(65 + (x >= 8 ? x + 1 : x)); // Skip I
            const row = y + 1;
            return `${col}${row}`;
        }

        canvas.addEventListener('click', async (e) => {
            const rect = canvas.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            const x = Math.round((clickX - OFFSET) / CELL_SIZE);
            const y = Math.round((clickY - OFFSET) / CELL_SIZE);

            if (x >= 0 && x < BOARD_SIZE && y >= 0 && y < BOARD_SIZE && !boardState[y][x]) {
                placeStone(x, y, currentPlayer);

                if (playingWithAI && currentPlayer === 'B') {
                    // User played, now AI plays
                    await letAIPlay();
                }
            }
        });

        function placeStone(x, y, color) {
            boardState[y][x] = color;
            moveHistory.push({x, y, color});
            currentPlayer = color === 'B' ? 'W' : 'B';
            updateUI();
            drawBoard();
        }

        async function letAIPlay() {
            setStatus('AI 思考中...', true);
            const boardStateSGF = boardStateToSGF();

            try {
                const response = await fetch('http://localhost:8000/api/go/play-move', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        board_state: boardStateSGF,
                        player_color: currentPlayer
                    })
                });

                const data = await response.json();
                const coords = moveToCoords(data.move);

                if (coords) {
                    const [x, y] = coords;
                    placeStone(x, y, currentPlayer);
                    setStatus(`AI 下在 ${data.move} (胜率: ${(data.winrate * 100).toFixed(1)}%)`);
                }
            } catch (error) {
                setStatus('AI 下棋失败: ' + error.message);
            }
        }

        async function getSuggestions() {
            setStatus('正在获取 AI 推荐...', true);
            const boardStateSGF = boardStateToSGF();

            try {
                const response = await fetch('http://localhost:8000/api/go/suggest-moves', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        board_state: boardStateSGF,
                        player_color: currentPlayer,
                        num_suggestions: 5
                    })
                });

                const data = await response.json();
                aiSuggestions = data.suggestions;
                displaySuggestions();
                drawBoard();
                setStatus(`找到 ${aiSuggestions.length} 个推荐着法`);
            } catch (error) {
                setStatus('获取推荐失败: ' + error.message);
            }
        }

        function displaySuggestions() {
            const panel = document.getElementById('suggestionsPanel');
            const list = document.getElementById('suggestionsList');
            panel.style.display = 'block';
            list.innerHTML = '';

            aiSuggestions.forEach((sug, idx) => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.innerHTML = `
                    <span class="suggestion-rank">${idx + 1}</span>
                    <span class="suggestion-move">${sug.move}</span>
                    <span class="suggestion-stats">
                        胜率: ${(sug.winrate * 100).toFixed(1)}% |
                        目数: ${sug.score_lead > 0 ? '+' : ''}${sug.score_lead.toFixed(1)}
                    </span>
                `;

                item.addEventListener('click', () => {
                    if (selectedMoves.has(sug.move)) {
                        selectedMoves.delete(sug.move);
                        item.classList.remove('selected');
                    } else if (selectedMoves.size < 2) {
                        selectedMoves.add(sug.move);
                        item.classList.add('selected');
                    }

                    document.getElementById('compareBtn').disabled = selectedMoves.size !== 2;
                });

                list.appendChild(item);
            });
        }

        async function compareSelectedMoves() {
            const moves = Array.from(selectedMoves);
            if (moves.length !== 2) return;

            setStatus('正在分析对比...', true);
            const boardStateSGF = boardStateToSGF();

            try {
                const response = await fetch('http://localhost:8000/api/go/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        board_state: boardStateSGF,
                        move_a: moves[0],
                        move_b: moves[1],
                        player_color: currentPlayer
                    })
                });

                const result = await response.json();
                displayComparison(result);
                setStatus('分析完成!');
            } catch (error) {
                setStatus('分析失败: ' + error.message);
            }
        }

        function displayComparison(result) {
            const panel = document.getElementById('comparisonPanel');
            const content = document.getElementById('comparisonContent');
            panel.style.display = 'block';

            content.innerHTML = `
                <div style="margin-bottom: 15px;">
                    <strong>${result.move_a}</strong> vs <strong>${result.move_b}</strong>
                </div>
                <div style="margin-bottom: 10px;">
                    <strong>胜率差:</strong> ${(result.delta_vector.delta_winrate * 100).toFixed(2)}%
                </div>
                <div style="margin-bottom: 10px;">
                    <strong>目数差:</strong> ${result.delta_vector.delta_lead.toFixed(1)} 目
                </div>
                <div style="margin-bottom: 10px;">
                    <strong>验证:</strong> ${result.reconstruction_passed ? '✓ 通过' : '⚠ 未通过'}
                </div>
                <div style="border-top: 2px solid #e0e0e0; padding-top: 15px; margin-top: 15px;">
                    <strong>AI 分析:</strong>
                    <p style="margin-top: 10px; line-height: 1.6;">${result.final_explanation.text}</p>
                </div>
            `;
        }

        function boardStateToSGF() {
            let sgf = '(;GM[1]FF[4]SZ[19]';
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (boardState[y][x]) {
                        const sgfX = String.fromCharCode(97 + x);
                        const sgfY = String.fromCharCode(97 + y);
                        const color = boardState[y][x];
                        sgf += `;${color}[${sgfX}${sgfY}]`;
                    }
                }
            }
            sgf += ')';
            return sgf;
        }

        function undo() {
            if (moveHistory.length > 0) {
                const last = moveHistory.pop();
                boardState[last.y][last.x] = null;
                currentPlayer = last.color;
                updateUI();
                drawBoard();
            }
        }

        function reset() {
            boardState = Array(19).fill(null).map(() => Array(19).fill(null));
            moveHistory = [];
            currentPlayer = 'B';
            playingWithAI = false;
            aiSuggestions = [];
            selectedMoves.clear();
            document.getElementById('suggestionsPanel').style.display = 'none';
            document.getElementById('comparisonPanel').style.display = 'none';
            updateUI();
            drawBoard();
            setStatus('');
        }

        function updateUI() {
            document.getElementById('nextPlayer').textContent = currentPlayer === 'B' ? '黑棋' : '白棋';
            document.getElementById('moveCount').textContent = moveHistory.length;
            document.getElementById('modeDisplay').textContent = playingWithAI ? '与AI对弈' : '编辑棋盘';
        }

        function setStatus(msg, loading = false) {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = loading ? 'status loading' : 'status';
        }

        // Event listeners
        document.getElementById('playWithAIBtn').addEventListener('click', () => {
            playingWithAI = !playingWithAI;
            const btn = document.getElementById('playWithAIBtn');
            btn.textContent = playingWithAI ? '🛑 停止对弈' : '🤖 与AI对弈';
            updateUI();
            setStatus(playingWithAI ? '与AI对弈模式已启动' : '对弈模式已关闭');
        });

        document.getElementById('getSuggestionsBtn').addEventListener('click', getSuggestions);
        document.getElementById('compareBtn').addEventListener('click', compareSelectedMoves);
        document.getElementById('undoBtn').addEventListener('click', undo);
        document.getElementById('resetBtn').addEventListener('click', reset);

        // Initial draw
        drawBoard();
        updateUI();

        // 生成金色粒子
        for(let i = 0; i < 25; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.setProperty('--drift', (Math.random() - 0.5) * 200 + 'px');
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (12 + Math.random() * 6) + 's';
            document.body.appendChild(particle);
        }
    </script>
</body>
</html>
