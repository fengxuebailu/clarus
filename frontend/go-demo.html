<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋·段位提升</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Layers -->
    <div class="bg-container">
        <div class="bg-layer mountains"></div>
        <div class="bg-layer clouds"></div>
        <div class="bg-layer fog"></div>

        <!-- Animated Light Rays -->
        <div class="light-ray ray-1"></div>
        <div class="light-ray ray-2"></div>
        <div class="light-ray ray-3"></div>
        <div class="light-ray ray-4"></div>

        <!-- Floating Particles -->
        <div class="particles" id="particles"></div>
    </div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Top Badge -->
        <div class="top-badge">
            <div class="badge-glow"></div>
            <div class="badge-content">限定</div>
        </div>

        <!-- Title Area -->
        <div class="title-area">
            <div class="title-icon">⚫</div>
            <div class="title-text">山海·浮生绘卷</div>
        </div>

        <!-- Close Button -->
        <button class="close-btn">✕</button>

        <!-- Center Platform -->
        <div class="platform-container">
            <!-- Ornate Frame Corners -->
            <div class="frame-corner corner-tl"></div>
            <div class="frame-corner corner-tr"></div>
            <div class="frame-corner corner-bl"></div>
            <div class="frame-corner corner-br"></div>

            <!-- Golden Border Glow -->
            <div class="platform-glow"></div>

            <!-- Inner Platform -->
            <div class="platform-inner">
                <!-- Go Board -->
                <div class="go-board">
                    <svg class="board-grid" viewBox="0 0 400 400">
                        <!-- Grid Lines -->
                        <defs>
                            <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0,0,0,0.4)" stroke-width="0.5"/>
                            </pattern>
                            <filter id="glow">
                                <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                                <feMerge>
                                    <feMergeNode in="coloredBlur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>

                        <!-- Background -->
                        <rect width="400" height="400" fill="#f5f0e8" opacity="0.95"/>

                        <!-- Grid Pattern -->
                        <g transform="translate(20, 20)">
                            <!-- Vertical Lines -->
                            <line x1="0" y1="0" x2="0" y2="360" stroke="#2c2416" stroke-width="1" opacity="0.6"/>
                            <line x1="20" y1="0" x2="20" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="40" y1="0" x2="40" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="60" y1="0" x2="60" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="80" y1="0" x2="80" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="100" y1="0" x2="100" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="120" y1="0" x2="120" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="140" y1="0" x2="140" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="160" y1="0" x2="160" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="180" y1="0" x2="180" y2="360" stroke="#2c2416" stroke-width="1" opacity="0.6"/>
                            <line x1="200" y1="0" x2="200" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="220" y1="0" x2="220" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="240" y1="0" x2="240" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="260" y1="0" x2="260" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="280" y1="0" x2="280" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="300" y1="0" x2="300" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="320" y1="0" x2="320" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="340" y1="0" x2="340" y2="360" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="360" y1="0" x2="360" y2="360" stroke="#2c2416" stroke-width="1" opacity="0.6"/>

                            <!-- Horizontal Lines -->
                            <line x1="0" y1="0" x2="360" y2="0" stroke="#2c2416" stroke-width="1" opacity="0.6"/>
                            <line x1="0" y1="20" x2="360" y2="20" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="40" x2="360" y2="40" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="60" x2="360" y2="60" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="80" x2="360" y2="80" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="100" x2="360" y2="100" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="120" x2="360" y2="120" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="140" x2="360" y2="140" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="160" x2="360" y2="160" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="180" x2="360" y2="180" stroke="#2c2416" stroke-width="1" opacity="0.6"/>
                            <line x1="0" y1="200" x2="360" y2="200" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="220" x2="360" y2="220" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="240" x2="360" y2="240" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="260" x2="360" y2="260" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="280" x2="360" y2="280" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="300" x2="360" y2="300" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="320" x2="360" y2="320" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="340" x2="360" y2="340" stroke="#2c2416" stroke-width="0.5" opacity="0.4"/>
                            <line x1="0" y1="360" x2="360" y2="360" stroke="#2c2416" stroke-width="1" opacity="0.6"/>

                            <!-- Star Points -->
                            <circle cx="60" cy="60" r="3" fill="#2c2416" opacity="0.8"/>
                            <circle cx="180" cy="60" r="3" fill="#2c2416" opacity="0.8"/>
                            <circle cx="300" cy="60" r="3" fill="#2c2416" opacity="0.8"/>
                            <circle cx="60" cy="180" r="3" fill="#2c2416" opacity="0.8"/>
                            <circle cx="180" cy="180" r="4" fill="#2c2416" opacity="0.8"/>
                            <circle cx="300" cy="180" r="3" fill="#2c2416" opacity="0.8"/>
                            <circle cx="60" cy="300" r="3" fill="#2c2416" opacity="0.8"/>
                            <circle cx="180" cy="300" r="3" fill="#2c2416" opacity="0.8"/>
                            <circle cx="300" cy="300" r="3" fill="#2c2416" opacity="0.8"/>
                        </g>

                        <!-- Sample Stones -->
                        <g class="stones">
                            <!-- Black Stones -->
                            <circle cx="100" cy="100" r="8" fill="#1a1a1a" filter="url(#glow)" class="stone"/>
                            <circle cx="120" cy="120" r="8" fill="#1a1a1a" filter="url(#glow)" class="stone"/>
                            <circle cx="140" cy="100" r="8" fill="#1a1a1a" filter="url(#glow)" class="stone"/>
                            <circle cx="280" cy="280" r="8" fill="#1a1a1a" filter="url(#glow)" class="stone"/>
                            <circle cx="260" cy="300" r="8" fill="#1a1a1a" filter="url(#glow)" class="stone"/>

                            <!-- White Stones -->
                            <circle cx="160" cy="120" r="8" fill="#f8f8f8" stroke="#ddd" stroke-width="0.5" filter="url(#glow)" class="stone"/>
                            <circle cx="100" cy="120" r="8" fill="#f8f8f8" stroke="#ddd" stroke-width="0.5" filter="url(#glow)" class="stone"/>
                            <circle cx="120" cy="100" r="8" fill="#f8f8f8" stroke="#ddd" stroke-width="0.5" filter="url(#glow)" class="stone"/>
                            <circle cx="300" cy="280" r="8" fill="#f8f8f8" stroke="#ddd" stroke-width="0.5" filter="url(#glow)" class="stone"/>
                            <circle cx="280" cy="300" r="8" fill="#f8f8f8" stroke="#ddd" stroke-width="0.5" filter="url(#glow)" class="stone"/>

                            <!-- Highlighted Stones (Purple/Pink as in reference) -->
                            <circle cx="220" cy="240" r="9" fill="#d946ef" filter="url(#glow)" class="stone highlight-stone"/>
                            <circle cx="240" cy="240" r="9" fill="#d946ef" filter="url(#glow)" class="stone highlight-stone"/>
                            <circle cx="260" cy="240" r="9" fill="#d946ef" filter="url(#glow)" class="stone highlight-stone"/>
                        </g>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Rank Display -->
        <div class="rank-display">
            <div class="rank-badge">
                <div class="rank-glow"></div>
                <div class="rank-content">
                    <div class="rank-label">当前段位</div>
                    <div class="rank-value">九段</div>
                </div>
            </div>
        </div>

        <!-- Bottom Action Button -->
        <div class="bottom-controls">
            <button class="start-btn">
                <span class="btn-glow"></span>
                <span class="btn-text">开始对弈</span>
            </button>
        </div>

        <!-- Decorative Architecture Elements -->
        <div class="architecture-left"></div>
        <div class="architecture-right"></div>
        <div class="pagoda-top"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
